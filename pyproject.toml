[project]
name = "api-local-tts-clean"
version = "0.1.0"
dependencies = [
    "fastapi",
    "uvicorn",
    "torch>=2.4.1",
    "torchaudio>=2.4.1",
    "transformers",
    "scipy",
    "pytest",
    "pytest-asyncio",
    "httpx",
    "pytorch-triton-rocm>=3.5.1 ; sys_platform == 'linux'",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []

[tool.uv.sources]
torch = [{ index = "pytorch-rocm", marker = "sys_platform == 'linux'" }]
torchaudio = [{ index = "pytorch-rocm", marker = "sys_platform == 'linux'" }]
pytorch-triton-rocm = [{ index = "pytorch-rocm", marker = "sys_platform == 'linux'" }]

[[tool.uv.index]]
name = "pytorch-rocm"
url = "https://download.pytorch.org/whl/rocm6.4"
explicit = true

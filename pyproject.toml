[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Lokal AI-server med Llama-3 och XTTS-v2 för AMD GPU"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "llama-cpp-python>=0.2.75",
    "TTS>=0.22.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "numpy<2.0.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
    "ruff>=0.3.0",
]

[tool.ruff]
line-length = 100
select = ["E", "F", "I"]
fix = true
[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Lokal AI-server med Ollama och XTTS-v2 för AMD GPU"
readme = "README.md"
requires-python = "==3.10.*"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "TTS==0.22.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "numpy<2.0.0",
    "httpx",
    "transformers>=4.33.0",
    "tokenizers>=0.13.3",
    "torch==2.4.1+rocm6.0",
    "torchvision==0.19.1+rocm6.0",
    "torchaudio==2.4.1+rocm6.0",
]

[[tool.uv.index]]
name = "rocm"
url = "https://download.pytorch.org/whl/rocm6.0"
explicit = true

[tool.uv.sources]
torch = { index = "rocm" }
torchvision = { index = "rocm" }
torchaudio = { index = "rocm" }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
    "ruff>=0.3.0",
    "pytest-asyncio>=0.23.0",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "strict"

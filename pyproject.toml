[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Simple & Stable AI Voice API (Ollama + Piper)"
readme = "README.md"
requires-python = "==3.10.*"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "piper-tts>=1.2.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "httpx",
    "pytest",
    "pytest-asyncio",
]

[tool.uv]
managed = true

[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Lokal AI-server med Llama-3 och XTTS-v2 för AMD GPU"
readme = "README.md"
requires-python = ">=3.10, <3.12"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "llama-cpp-python>=0.2.75",
    "TTS==0.22.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "numpy<2.0.0",
    "torch>=2.1.0",
]

[tool.uv]
# dev-dependencies har flyttats till dependency-groups

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
    "ruff>=0.3.0",
    "pytest-asyncio>=0.23.0",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "strict"

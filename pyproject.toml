[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Lokal AI-server med Ollama och XTTS-v2 för AMD GPU"
readme = "README.md"
requires-python = "==3.10.*"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "TTS==0.22.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "numpy<2.0.0",
    "httpx",
    "transformers==4.33.0",
    "tokenizers",
]

[tool.uv]
managed = false # Detta gör att uv inte försöker "synka" automatiskt

[project]
name = "api-local-tts-server"
version = "0.1.0"
description = "Lokal AI-server med Ollama och Piper för AMD GPU"
readme = "README.md"
requires-python = "==3.10.*"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "piper-tts>=1.2.0",
    "pydantic>=2.6.0",
    "python-multipart>=0.0.9",
    "httpx",
    "torch==2.4.1+rocm6.0",
]

[[tool.uv.index]]
name = "rocm"
url = "https://download.pytorch.org/whl/rocm6.0"
explicit = true

[tool.uv.sources]
torch = { index = "rocm" }

[tool.uv]
managed = true
